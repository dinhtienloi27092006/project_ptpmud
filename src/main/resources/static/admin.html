<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />

    <title>Admin Orders</title>

    <style>
      body {
        font-family: Arial;
        padding: 20px;
        background: #f5f5f5;
      }

      .order-card {
        background: white;
        padding: 20px;
        margin-bottom: 20px;
        border-radius: 10px;
      }

      .order-item {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 8px 0;
      }

      .order-item.done {
        color: #777;
        text-decoration: line-through;
      }

      .item-label {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .item-label input {
        transform: scale(1.2);
      }

      .checkout-btn {
        background-color: #4caf50;
        color: white;
        border: none;
        padding: 8px 14px;
        border-radius: 5px;
        cursor: pointer;
        font-size: 14px;
        transition: background-color 0.3s ease;
      }

      .checkout-btn:hover {
        background-color: #388e3c;
      }

      .checkout-btn:active {
        transform: scale(0.95);
      }

      .order-card.pending {
        border-left: 5px solid #ff5252;
      }

      .order-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 15px;
      }
    </style>
  </head>

  <body>
    <h1>📦 Danh sách Order</h1>

    <div
      style="
        margin-bottom: 20px;
        padding: 10px;
        background: #e8f5e9;
        border-radius: 5px;
        color: #2e7d32;
      "
    >
      <span id="updateStatus">🔄 Reload khi có đơn hàng mới...</span>
      <span id="lastUpdated" style="margin-left: 20px; color: #666"></span>
    </div>

    <div id="orders"></div>

    <script>
      function loadOrders() {
        fetch("/api/orders")
          .then((res) => res.json())
          .then((data) => {
            const ordersDiv = document.getElementById("orders");
            ordersDiv.innerHTML = "";

            data.forEach((order) => {
              const div = document.createElement("div");
              div.className =
                "order-card" + (order.status === "PENDING" ? " pending" : "");

              let itemsHtml = "";

              order.items.forEach((item) => {
                const doneClass = item.done ? "done" : "";
                const checked = item.done ? "checked" : "";

                itemsHtml += `
                  <div class="order-item ${doneClass}">
                    <div class="item-label">
                      <label>
                        <input
                          type="checkbox"
                          onchange="toggleDone(${item.id}, this.checked)"
                          ${checked}
                        />
                        ${item.food.name} x ${item.quantity}
                      </label>
                    </div>
                    <span>${item.subtotal.toLocaleString()} đ</span>
                  </div>
                `;
              });

              div.innerHTML = `
                <div class="order-header">
                  <h2>Bàn: ${order.table.tableNumber}</h2>
                  <button class="checkout-btn" onclick="checkoutOrder(${order.id})">💳 Thanh toán</button>
                </div>
                ${itemsHtml}
                <h3>Tổng tiền: ${order.totalPrice.toLocaleString()} đ</h3>
                <hr />
              `;

              ordersDiv.appendChild(div);
            });

            // Cập nhật thời gian lần cuối
            updateLastUpdatedTime();
          })
          .catch((error) => {
            console.error(error);
            alert("Lỗi load orders");
          });
      }

      function updateLastUpdatedTime() {
        const now = new Date();
        const timeString = now.toLocaleTimeString("vi-VN");
        document.getElementById("lastUpdated").textContent =
          `📅 Cập nhật lúc: ${timeString}`;
      }

      function checkoutOrder(orderId) {
        if (confirm("Xác nhận thanh toán cho bàn này?")) {
          fetch(`/api/orders/${orderId}`, {
            method: "DELETE",
            headers: {
              "Content-Type": "application/json",
            },
          })
            .then((res) => {
              if (!res.ok) {
                return res.text().then((text) => {
                  throw new Error(`Lỗi ${res.status}: ${text}`);
                });
              }
              return res.text();
            })
            .then(() => {
              alert("Thanh toán thành công!");
              loadOrders();
            })
            .catch((error) => {
              console.error("Chi tiết lỗi:", error);
              alert(`Thanh toán thất bại: ${error.message}`);
            });
        }
      }

      function toggleDone(itemId, done) {
        fetch(`/api/orders/items/${itemId}/done`, {
          method: "PUT",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify({ done }),
        })
          .then((res) => {
            if (!res.ok) {
              throw new Error("Không cập nhật được trạng thái");
            }
            return res.json();
          })
          .then(() => {
            loadOrders();
          })
          .catch((error) => {
            console.error(error);
            alert("Cập nhật trạng thái món thất bại");
          });
      }

      // Load danh sách order lần đầu
      loadOrders();
      setInterval(loadOrders, 8000);

      // Listen để reload ngay khi có đơn hàng mới hoặc thanh toán thành công từ app.js
      if (typeof BroadcastChannel !== "undefined") {
        const orderChannel = new BroadcastChannel("restaurant-order");
        orderChannel.onmessage = (event) => {
          if (event.data.type === "NEW_ORDER") {
            console.log("Có đơn hàng mới từ bàn:", event.data.tableId);
            loadOrders();
          }
        };

        const paymentChannel = new BroadcastChannel("restaurant-payment");
        paymentChannel.onmessage = (event) => {
          if (event.data.type === "PAYMENT_SUCCESS") {
            console.log("Thanh toán thành công từ bàn:", event.data.tableId);
            loadOrders();
          }
        };
      } else {
        // Fallback: listen localStorage changes
        window.addEventListener("storage", (event) => {
          if (event.key === "newOrder" || event.key === "restaurant-payment") {
            console.log("Cập nhật đơn hàng/ thanh toán mới");
            loadOrders();
          }
        });
      }
    </script>
  </body>
</html>
